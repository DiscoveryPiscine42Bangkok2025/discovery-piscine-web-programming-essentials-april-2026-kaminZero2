<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Box Table</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        td {
            border: 2px solid black;
            padding: 20px;
            text-align: center;
            width: 50%;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td style="background-color: green;">First cell</td>
            <td style="background-color: pink;">Second cell</td>
        </tr>
    </table>

</body>
</html>
