<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        #balloon {
            width: 200px;
            height: 200px;
            background-color: red;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div id="balloon"></div>

    <script>
        const $balloon = $('#balloon');
        const colors = ['red', 'green', 'blue'];
        let colorIdx = 0;
        let size = 200;

        function updateBalloon() {
            $balloon.css({
                width: size + 'px',
                height: size + 'px',
                backgroundColor: colors[colorIdx]
            });
        }

        $balloon.on('click', () => {
            size += 10;
            if (size > 420) {
                size = 200;
                colorIdx = 0;
            } else {
                colorIdx = (colorIdx + 1) % colors.length;
            }
            updateBalloon();
        });

        $balloon.on('mouseleave', () => {
            if (size > 200) {
                size -= 5;
                colorIdx = (colorIdx - 1 + colors.length) % colors.length;
                updateBalloon();
            }
        });
    </script>
</body>
</html>
