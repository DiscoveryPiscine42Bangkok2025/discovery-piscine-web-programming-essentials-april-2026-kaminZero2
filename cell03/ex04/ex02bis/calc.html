<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Calculator</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div>
        <input id="io" type="number" placeholder="1st number">
        <select id="dd">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
            <option value="%">%</option>
        </select>
        <input id="it" type="number" placeholder="2nd number">
        <button id="btn-calc">Try me!</button>
    </div>

    <script>
        $(document).ready(function() {
            $("#btn-calc").on('click', function() {
                let v1 = Number($("#io").val());
                let v2 = Number($("#it").val());
                let op = $("#dd").val();

                if ($("#io").val() === "" || $("#it").val() === "") {
                    alert("Error :(");
                    return;
                }

                if ((op === "/" || op === "%") && v2 === 0) {
                    alert("It’s over 9000!");
                    console.log("It’s over 9000!");
                    return;
                }

                if (v1 < 0 || v2 < 0) {
                    alert("Error :(");
                    return;
                }

                let result;
                switch (op) {
                    case "+": result = v1 + v2; break;
                    case "-": result = v1 - v2; break;
                    case "*": result = v1 * v2; break;
                    case "/": result = v1 / v2; break;
                    case "%": result = v1 % v2; break;
                }

                alert(result);
                console.log(result);
            });

            setInterval(() => {
                alert("Please, use me...");
            }, 30000);
        });
    </script>
</body>
</html>
